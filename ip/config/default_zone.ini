# LCD CF Pattern Defect Detection Configuration
# =============================================

[Image]
# Image dimensions (actual test images are 8160 wide)
width = 8160
height = 5000
bits = 8

[Pattern]
# Pattern pitch settings (in pixels)
pitch_x = 26
pitch_y = 19

# Local search range (pixels around expected position)
# Original full search (slow): 3 pixels
search_range_x = 3
search_range_y = 3

# Lightweight search range for fast kernel (pixels)
# 0 = no search (fastest, may have false positives with camera skew)
# 1 = ±1 pixel search (recommended for slight skew)
# 2 = ±2 pixel search (more tolerance, slightly slower)
fast_search_range = 1

# Multi-scale detection for large defects (> 2 pitch)
# 0 = disabled (fastest, may miss large area defects)
# 1 = enable 2x downsampled detection (+~1ms)
# 2 = enable 2x and 4x detection (+~1.5ms)
enable_multiscale = 1

[LensShading]
# Lens Shading Correction (LSC) - Corrects radial brightness falloff (vignetting)
# Recommended for cameras with visible darkening at image corners
#
# enable_lsc: 0 = disabled (default), 1 = enabled
# Estimated Tact Time impact: +0.3~0.5ms for 8192x5000 image
enable_lsc = 0

# LSC polynomial model: gain(r) = 1 + k1*r² + k2*r⁴ + k3*r⁶
# r = normalized radius from optical center (0 at center, 1 at corner)
# k1 = quadratic coefficient (primary vignette correction, typical: 0.1~0.3)
# k2 = quartic coefficient (fine-tuning, typical: 0.0~0.1)
# k3 = sextic coefficient (rarely needed, typical: 0.0)
lsc_k1 = 0.15
lsc_k2 = 0.05
lsc_k3 = 0.0

# Maximum gain clamp (prevents over-correction at extreme corners)
# Typical range: 1.3~2.0
lsc_max_gain = 1.5

# Auto-calibrate LSC from first image (samples corners vs center)
# 0 = use manual k1/k2/k3 values above
# 1 = auto-detect vignette strength from first image
lsc_auto_calibrate = 0

[Threshold]
# Brightness threshold - ratio compared to expected value
# BTH: Bright defect threshold (center*8 > neighbors_sum * BTH)
# DTH: Dark defect threshold (center*8 < neighbors_sum * DTH)
BTH = 1.40
DTH = 0.60

[Debug]
# Enable debug mode with random defects
enable_debug_defects = 1
num_defects = 200
defect_size = 4
num_bright_defects = 100
num_dark_defects = 100
bright_multiplier = 1.8
dark_multiplier = 0.3

[Output]
result_csv = Result.csv
result_image = result.bmp

[GPU]
# CUDA block dimensions for optimization
block_dim_x = 32
block_dim_y = 32
