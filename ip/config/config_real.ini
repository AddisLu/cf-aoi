# LCD CF Pattern 缺陷檢測 - 真實影像配置
# ======================================

[Image]
# 實際影像寬度為 8160（非 8192），已校正
width = 8160
height = 5000
bits = 8

[Pattern]
pitch_x = 26
pitch_y = 19
search_range_x = 3
search_range_y = 3
# 保持 local search 處理機構蛇行
fast_search_range = 1
# 保持 multi-scale 檢測大顆 defect
enable_multiscale = 1

[LensShading]
# 啟用 LSC 校正嚴重的 lens vignetting (corner/center ~0.44)
enable_lsc = 1
lsc_k1 = 0.80
lsc_k2 = 0.40
lsc_k3 = 0.10
lsc_max_gain = 2.5
lsc_auto_calibrate = 0

[Threshold]
BTH = 1.60
DTH = 0.50

[Debug]
# 關閉模擬缺陷，用於檢測真實影像
enable_debug_defects = 0

[Output]
result_csv = Result.csv
result_image = result.bmp

[GPU]
# 使用 16x16 block 減少 register pressure，提升 occupancy
block_dim_x = 16
block_dim_y = 16
